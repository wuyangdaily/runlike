name: Build & Release Runlike Docker

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ----------------- Checkout -----------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------- Setup Python -----------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # ----------------- Install dependencies -----------------
      - name: Install Poetry & TOML
        run: |
          python -m pip install --upgrade pip
          pip install poetry toml

      # ----------------- Get version -----------------
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(poetry run python ./current_version.py)
          # 限制最大版本为 PyPI 上最新版本
          if [[ "$VERSION" > "1.5.4" ]]; then
            VERSION="1.5.4"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ----------------- Docker Login -----------------
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------- Build & Push Docker -----------------
      - name: Build and Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: yourusername/runlike:latest
          build-args: |
            VERSION=${{ steps.get_version.outputs.version }}

      # ----------------- Run Fixture Containers -----------------
      - name: Start fixture containers
        run: |
          #!/bin/bash
          set -eu
          fixtures=(runlike_fixture1 runlike_fixture2 runlike_fixture3)
          for i in "${fixtures[@]}"; do
            if ! docker container inspect "$i" >/dev/null 2>&1; then
              echo "Creating fixture container $i"
              docker run -d --name "$i" alpine sleep 60
            fi
          done

      # ----------------- Inspect Fixtures -----------------
      - name: Inspect fixtures
        run: |
          fixtures=(runlike_fixture1 runlike_fixture2 runlike_fixture3)
          for i in "${fixtures[@]}"; do
            echo "Inspecting $i"
            docker container inspect "$i"
          done

      # ----------------- Run Tests -----------------
      - name: Run make test
        run: |
          # 确保 fixture 容器存在
          make test

      # ----------------- Cleanup -----------------
      - name: Cleanup fixtures
        run: |
          fixtures=(runlike_fixture1 runlike_fixture2 runlike_fixture3)
          for i in "${fixtures[@]}"; do
            docker rm -f "$i" || true
          done
