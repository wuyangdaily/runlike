name: Release runlike Docker Image

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ----------------- Checkout -----------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------- Setup Python -----------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # ----------------- Install Poetry & TOML -----------------
      - name: Install Poetry & TOML
        run: |
          python -m pip install --upgrade pip
          pip install poetry toml

      # ----------------- Install dependencies -----------------
      - name: Poetry install
        run: poetry install

      # ----------------- Get Version with fallback -----------------
      - name: Get Version
        id: get_version
        run: |
          set -e
          # 默认版本
          DEFAULT_VERSION="1.5.4"
          VERSION=""
          # 尝试从 current_version.py 获取
          if poetry run python ./current_version.py > /dev/null 2>&1; then
              VERSION=$(poetry run python ./current_version.py)
          fi
          # 限制最大版本为 1.5.4
          if [[ -z "$VERSION" ]] || [[ "$VERSION" > "$DEFAULT_VERSION" ]]; then
              VERSION="$DEFAULT_VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      # ----------------- Docker Login -----------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------- Build & Push Docker -----------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: yourusername/runlike:latest
          build-args: |
            VERSION=${{ steps.get_version.outputs.version }}
