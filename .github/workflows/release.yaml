name: Release runlike Docker

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ----------------- Checkout -----------------
      - uses: actions/checkout@v4

      # ----------------- Setup Python -----------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # ----------------- Install dependencies -----------------
      - name: Install Poetry and dependencies
        run: |
          pip install poetry toml
          poetry install

      # ----------------- Get version with fallback -----------------
      - name: Determine Runlike version
        id: get_version
        run: |
          set +e
          VERSION=$(poetry run python ./current_version.py)
          # 尝试 pip install
          pip install --no-cache-dir "runlike==$VERSION"
          if [ $? -ne 0 ]; then
            echo "Version $VERSION not found on PyPI, fallback to 1.5.4"
            VERSION="1.5.4"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          set -e

      # ----------------- Docker Login -----------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------- Build & Push Docker -----------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: wuyangdaily/runlike:latest
          build-args: |
            VERSION=${{ steps.get_version.outputs.version }}
